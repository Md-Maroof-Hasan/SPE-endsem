version: '3'

services:

  auth-service:
    build: ./auth-service
    ports:
      - "5001:5001"

  notes-service:
    build: ./notes-service
    ports:
      - "5002:5002"
    depends_on:
      - auth-service
      - audit-service

  audit-service:
    build: ./audit-service
    ports:
      - "5003:5003"

  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home

  sonarqube:
    image: sonarqube:community
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"

volumes:
  jenkins_home:
