version: '3'

services:

  auth-service:
    build: ./auth-service
    container_name: auth-service

  notes-service:
    build: ./notes-service
    container_name: notes-service
    depends_on:
      - auth-service
      - audit-service

  audit-service:
    build: ./audit-service
    container_name: audit-service

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth-service
      - notes-service
      - audit-service
