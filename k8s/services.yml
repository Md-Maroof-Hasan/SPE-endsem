apiVersion: v1
kind: Service

metadata:
  name: auth-service

spec:
  type: NodePort
    
  selector:
    app: auth-service

  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001

---

apiVersion: v1
kind: Service

metadata:
  name: notes-service

spec:
  type: NodePort

  selector:
    app: notes-service

  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5002

---

apiVersion: v1
kind: Service

metadata:
  name: audit-service

spec:
  type: NodePort

  selector:
    app: audit-service

  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003
