apiVersion: apps/v1
kind: Deployment

metadata:
  name: notes-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: notes-service

  template:
    metadata:
      labels:
        app: notes-service

    spec:
      containers:
      - name: notes-service
        image: project-notes-service:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 5002
